name: Build APK
on: push: branches: - main - master workflow_dispatch:
jobs: build: runs-on: ubuntu-22.04
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: "17"

  - name: Install packages
    run: |
      sudo apt-get update

      sudo apt-get install -y \
        git zip unzip \
        openjdk-17-jdk \
        autoconf automake \
        libtool pkg-config \
        zlib1g-dev \
        libffi-dev \
        libssl-dev \
        build-essential \
        ccache

  - name: Install Buildozer
    run: |
      python -m pip install --upgrade pip
      pip install buildozer==1.5.0
      pip install cython==0.29.37

  - name: Build APK
    run: |
      buildozer android debug > build.log 2>&1 || true
      tail -500 build.log

  - name: Upload Logs
    uses: actions/upload-artifact@v4
    with:
      name: build-log
      path: build.log

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: apk
      path: bin/*.apk
