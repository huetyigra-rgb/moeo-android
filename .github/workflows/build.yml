name: Build MEOE APK
 
on:
  push:
    branches: [main, master]
  workflow_dispatch:
 
jobs:
  build-android:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
 
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
 
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git \
            ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev libffi-dev \
            libssl-dev autoconf automake \
            libtool pkg-config \
            aidl
 
      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython
 
      - name: Prepare Buildozer SDK cache
        run: |
          # Buildozer downloads its own SDK to ~/.buildozer/android/platform/android-sdk
          # We pre-create the build-tools folder so aidl (installed via apt) is found there
          BSDK=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $BSDK/build-tools/33.0.2
          mkdir -p $BSDK/platform-tools
          mkdir -p $BSDK/platforms/android-33
 
          # Symlink the system aidl into Buildozer's expected build-tools path
          AIDL_PATH=$(which aidl)
          ln -sf $AIDL_PATH $BSDK/build-tools/33.0.2/aidl
 
          # Also export ANDROIDSDK so Buildozer knows to use this path
          echo "ANDROIDSDK=$BSDK"      >> $GITHUB_ENV
          echo "ANDROIDNDK_PATH=$HOME/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV
 
      - name: Build APK
        run: |
          buildozer android debug
        timeout-minutes: 120
 
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: meoe-apk
          path: bin/*.apk
          retention-days: 30
