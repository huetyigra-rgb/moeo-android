name: Build MEOE APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git \
            ffmpeg libsdl2-dev libsdl2-image-dev \
            libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev \
            libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0 \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            libsqlite3-dev libffi-dev \
            libssl-dev autoconf automake \
            libtool pkg-config \
            aidl

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Setup Android SDK and NDK
        run: |
          PLATFORM=$HOME/.buildozer/android/platform
          BSDK=$PLATFORM/android-sdk
          BNDK=$PLATFORM/android-ndk-r25b

          mkdir -p $BSDK/cmdline-tools
          mkdir -p $BSDK/tools/bin

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d $BSDK/cmdline-tools
          mv $BSDK/cmdline-tools/cmdline-tools $BSDK/cmdline-tools/latest

          SDKMANAGER=$BSDK/cmdline-tools/latest/bin/sdkmanager
          ln -sf $SDKMANAGER $BSDK/tools/bin/sdkmanager
          ln -sf $BSDK/cmdline-tools/latest/bin/avdmanager $BSDK/tools/bin/avdmanager

          yes | $SDKMANAGER --sdk_root=$BSDK --licenses > /dev/null 2>&1
          $SDKMANAGER --sdk_root=$BSDK \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

          ln -sf $(which aidl) $BSDK/build-tools/33.0.2/aidl

          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip -d $PLATFORM

          echo "ANDROIDSDK=$BSDK"  >> $GITHUB_ENV
          echo "ANDROIDNDK=$BNDK"  >> $GITHUB_ENV
          echo "ANDROIDAPI=33"     >> $GITHUB_ENV
          echo "ANDROIDMINAPI=24"  >> $GITHUB_ENV
          echo "$BSDK/tools/bin"                >> $GITHUB_PATH
          echo "$BSDK/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$BSDK/platform-tools"           >> $GITHUB_PATH
          echo "$BSDK/build-tools/33.0.2"       >> $GITHUB_PATH

      - name: Build APK
        env:
          ANDROIDSDK: ${{ env.ANDROIDSDK }}
          ANDROIDNDK: ${{ env.ANDROIDNDK }}
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "24"
          # Максимальный уровень логов чтобы увидеть реальную ошибку
          P4A_RELEASE_KEYALIAS: ""
        run: |
          # Запускаем p4a напрямую чтобы увидеть полный вывод ошибки
          python -m pythonforandroid.toolchain create \
            --dist-name=meoe \
            --bootstrap=sdl2 \
            --requirements=python3,kivy==2.2.1,android,androidstorage4kivy,numpy \
            --arch=arm64-v8a \
            --sdk-dir=$ANDROIDSDK \
            --ndk-dir=$ANDROIDNDK \
            --ndk-api=24 \
            --android-api=33 \
            --debug \
            2>&1 | tee /tmp/p4a_full.log || true

          echo "=== ПОСЛЕДНИЕ 50 СТРОК ЛОГА ==="
          tail -50 /tmp/p4a_full.log

          echo "=== ВСЕ ОШИБКИ ==="
          grep -i "error\|exception\|traceback\|failed" /tmp/p4a_full.log | tail -30

          # Теперь нормальный buildozer
          buildozer android debug
        timeout-minutes: 120

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: meoe-apk
          path: bin/*.apk
          retention-days: 30

      - name: Upload full p4a log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: p4a-debug-log
          path: /tmp/p4a_full.log
          retention-days: 7
